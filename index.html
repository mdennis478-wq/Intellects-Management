<h1>Intellects Chama Dashboard</h1>

<div id="summary"></div>

<table border="1" cellpadding="10">
<thead>
<tr>
<th>Member</th>
<th>Savings</th>
<th>Loan Limit (80%)</th>
</tr>
</thead>

<tbody id="membersTable"></tbody>
</table>

<script src="data.js"></script>

<script>

let totalSavings = 0;

members.forEach(member => {

totalSavings += member.savings;

document.getElementById("membersTable").innerHTML += `
<tr>
<td>${member.name}</td>
<td>KES ${member.savings.toLocaleString()}</td>
<td>KES ${(member.savings*0.8).toLocaleString()}</td>
</tr>
`;

});

document.getElementById("summary").innerHTML = `
<h2>Total Members: ${members.length}</h2>
<h2>Total Contributions: KES ${totalSavings.toLocaleString()}</h2>
`;

</script>
